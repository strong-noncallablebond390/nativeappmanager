name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag version matches app version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          APP_VERSION="$(jq -r '.version' src-tauri/tauri.conf.json)"

          if [ -z "$APP_VERSION" ] || [ "$APP_VERSION" = "null" ]; then
            exit 1
          fi

          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config fakeroot rpm jq

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build raw binary
        run: |
          cd src-tauri
          cargo build --release

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles appimage,deb,rpm
          tagName: ${{ github.ref_name }}
          releaseName: "Native App Manager ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false

      - name: Package for Arch Linux and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-arch

          BIN_PATH="src-tauri/target/release/nativeappmanager"

          if [ ! -f "$BIN_PATH" ]; then
            echo "Binary not found"
            exit 1
          fi

          cp "$BIN_PATH" dist-arch/nativeappmanager
          cp src-tauri/icons/icon.png dist-arch/

          cat > dist-arch/nativeappmanager.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Native App Manager
          Exec=nativeappmanager
          Icon=nativeappmanager
          Type=Application
          Categories=Development;
          DESKTOP

          cat > dist-arch/PKGBUILD << EOF
          pkgname=nativeappmanager-bin
          pkgver=${{ github.ref_name }}
          pkgver=\${pkgver#v}
          pkgrel=1
          pkgdesc="A powerful, native GUI for managing Docker environments"
          arch=('x86_64')
          url="https://github.com/pedrofariasx/nativeappmanager"
          license=('MIT')
          depends=('gtk3' 'webkit2gtk-4.1')
          options=('!strip')
          provides=('nativeappmanager')
          conflicts=('nativeappmanager')
          source=('nativeappmanager' 'icon.png' 'nativeappmanager.desktop')
          sha256sums=('SKIP' 'SKIP' 'SKIP')

          package() {
            install -Dm755 "\${srcdir}/nativeappmanager" "\${pkgdir}/usr/bin/nativeappmanager"
            install -Dm644 "\${srcdir}/icon.png" "\${pkgdir}/usr/share/icons/hicolor/256x256/apps/nativeappmanager.png"
            install -Dm644 "\${srcdir}/nativeappmanager.desktop" "\${pkgdir}/usr/share/applications/nativeappmanager.desktop"
          }
          EOF

          docker run --rm \
            -v "$PWD/dist-arch:/build" \
            -w /build \
            archlinux:latest bash -c "
              pacman -Syu --noconfirm --needed base-devel &&
              useradd -m builduser &&
              chown -R builduser:builduser /build &&
              su - builduser -c 'cd /build && makepkg -s --noconfirm'
            "

          gh release upload "${{ github.ref_name }}" dist-arch/*.pkg.tar.zst --clobber
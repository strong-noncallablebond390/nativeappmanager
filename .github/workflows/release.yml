name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag version matches app version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          APP_VERSION="$(jq -r '.version' src-tauri/tauri.conf.json)"

          if [ -z "$APP_VERSION" ] || [ "$APP_VERSION" = "null" ]; then
            echo "Could not read app version"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != app version ($APP_VERSION)"
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config fakeroot rpm jq

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build raw binary
        run: |
          cd src-tauri
          cargo build --release

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles appimage,deb,rpm
          tagName: ${{ github.ref_name }}
          releaseName: "Native App Manager ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false

      - name: Package for Arch Linux and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-arch

          BIN_PATH=$(find src-tauri/target/release -maxdepth 1 -type f -executable ! -name "*.d" | head -n 1)

          if [ -z "$BIN_PATH" ]; then
            echo "No binary found"
            exit 1
          fi

          BIN_NAME=$(basename "$BIN_PATH")

          ARCH_DEPENDS=('cairo' 'gdk-pixbuf2' 'glib2' 'gtk3' 'hicolor-icon-theme' 'libsoup3' 'webkit2gtk-4.1')
          declare -A ARCH_DEPENDS_SET
          for dep in "${ARCH_DEPENDS[@]}"; do
            ARCH_DEPENDS_SET["$dep"]=1
          done

          add_arch_dep() {
            local dep="$1"
            if [ -z "${ARCH_DEPENDS_SET[$dep]+x}" ]; then
              ARCH_DEPENDS+=("$dep")
              ARCH_DEPENDS_SET["$dep"]=1
            fi
          }

          map_deb_to_arch_dep() {
            case "$1" in
              libgtk-3-0) echo "gtk3" ;;
              libwebkit2gtk-4.1-0) echo "webkit2gtk-4.1" ;;
              libglib2.0-0) echo "glib2" ;;
              libgdk-pixbuf-2.0-0) echo "gdk-pixbuf2" ;;
              libsoup-3.0-0) echo "libsoup3" ;;
              librsvg2-2) echo "librsvg" ;;
              libcairo2) echo "cairo" ;;
              libgcc-s1|libgcc1) echo "gcc-libs" ;;
              *) echo "" ;;
            esac
          }

          DEB_DEPENDS=$(jq -r '.bundle.linux.deb.depends[]? // empty' src-tauri/tauri.conf.json)

          if [ -n "$DEB_DEPENDS" ]; then
            while IFS= read -r dep; do
              [ -z "$dep" ] && continue
              DEP_WITHOUT_VERSION=$(echo "$dep" | sed -E 's/\s*\([^)]*\)//g')
              DEP_RESOLVED=false

              IFS='|' read -ra DEP_CANDIDATES <<< "$DEP_WITHOUT_VERSION"
              for DEP_CANDIDATE in "${DEP_CANDIDATES[@]}"; do
                DEP_NAME=$(echo "$DEP_CANDIDATE" | xargs)
                [ -z "$DEP_NAME" ] && continue

                MAPPED_DEP=$(map_deb_to_arch_dep "$DEP_NAME")
                if [ -n "$MAPPED_DEP" ]; then
                  add_arch_dep "$MAPPED_DEP"
                  DEP_RESOLVED=true
                  break
                fi
              done

              if [ "$DEP_RESOLVED" = false ]; then
                echo "Unmapped dependency: $dep"
                exit 1
              fi
            done <<< "$DEB_DEPENDS"
          fi

          ARCH_DEPENDS_PKGBUILD=$(printf "'%s'\n" "${ARCH_DEPENDS[@]}" | paste -sd' ' -)

          PKG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="${PKG_VERSION#v}"
          PKG_VERSION="${PKG_VERSION//-/.}"

          cp "$BIN_PATH" dist-arch/$BIN_NAME
          cp src-tauri/icons/icon.png dist-arch/

          cat > dist-arch/${BIN_NAME}.desktop << DESKTOP
          [Desktop Entry]
          Name=Native App Manager
          Exec=${BIN_NAME}
          Icon=${BIN_NAME}
          Type=Application
          Categories=Development;
          DESKTOP

          cat > dist-arch/PKGBUILD << EOF
          pkgname=nativeappmanager-bin
          pkgver=${PKG_VERSION}
          pkgrel=1
          pkgdesc="A powerful, native GUI for managing Docker environments"
          arch=('x86_64')
          url="https://github.com/pedrofariasx/nativeappmanager"
          license=('MIT')
          depends=(${ARCH_DEPENDS_PKGBUILD})
          options=('!strip')
          provides=('nativeappmanager')
          conflicts=('nativeappmanager')
          source=('${BIN_NAME}'
                  'icon.png'
                  '${BIN_NAME}.desktop')
          sha256sums=('SKIP' 'SKIP' 'SKIP')

          package() {
            install -Dm755 "\${srcdir}/${BIN_NAME}" "\${pkgdir}/usr/bin/${BIN_NAME}"
            install -Dm644 "\${srcdir}/icon.png" "\${pkgdir}/usr/share/icons/hicolor/256x256/apps/${BIN_NAME}.png"
            install -Dm644 "\${srcdir}/${BIN_NAME}.desktop" "\${pkgdir}/usr/share/applications/${BIN_NAME}.desktop"
          }
          EOF

          docker run --rm \
            -v "$PWD/dist-arch:/build" \
            -w /build \
            archlinux:latest bash -c "
              pacman-key --init && pacman-key --populate archlinux &&
              pacman -Syu --noconfirm --needed base-devel namcap &&
              useradd -m builduser &&
              echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers &&
              chown -R builduser:builduser /build &&
              su - builduser -c 'cd /build && makepkg -s --noconfirm' &&
              namcap *.pkg.tar.zst || true
            "

          ARCH_PKG=$(ls dist-arch/*.pkg.tar.zst)
          gh release upload "${{ github.ref_name }}" "$ARCH_PKG" --clobber

      - name: Package tar.gz and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-targz

          BIN_PATH=$(find src-tauri/target/release -maxdepth 1 -type f -executable ! -name "*.d" | head -n 1)

          if [ -z "$BIN_PATH" ]; then
            echo "No binary found"
            exit 1
          fi

          BIN_NAME=$(basename "$BIN_PATH")

          PKG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="${PKG_VERSION#v}"

          cp "$BIN_PATH" dist-targz/
          cp LICENSE dist-targz/

          TAR_GZ="Native.App.Manager_${PKG_VERSION}_amd64.tar.gz"
          tar -C dist-targz -czf "$TAR_GZ" "$BIN_NAME" LICENSE

          gh release upload "${{ github.ref_name }}" "$TAR_GZ" --clobber
